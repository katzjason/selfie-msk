services:
    web:
        build: .
        ports:
        - "3000:3000"
        environment:
        - IMAGE_DIR=/data/images
        - NODE_ENV=production
        - DATABASE_URL=postgresql://app:app_password@db:5432/selfie
        volumes:
        - selfie_images:/data/images
        depends_on:
        - db

    caddy:
        image: caddy:2
        ports:
        - "0.0.0.0:443:443"
        - "0.0.0.0:80:80"
        volumes:
        - ./Caddyfile:/etc/caddy/Caddyfile:ro
        - ./certs:/certs:ro
        - caddy_data:/data
        - caddy_config:/config
        depends_on:
        - web

    db:
        image: postgres:16-alpine
        environment:
        - POSTGRES_DB=selfie
        - POSTGRES_USER=app
        - POSTGRES_PASSWORD=app_password
        volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./db/init/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
        ports:
        - "5433:5432"

volumes:
  selfie_images:
  postgres_data:
  caddy_data:
  caddy_config: